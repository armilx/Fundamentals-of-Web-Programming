<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облік приватних СЕС</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>☀️ Реєстр приватних сонячних електростанцій (СЕС)</h1>
        </header>

        <section class="stats-section">
            <h2>📊 Статистика мережі</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Зареєстровано СЕС</h3>
                    <p id="statCount">0</p>
                </div>
                <div class="stat-card">
                    <h3>Загальна потужність</h3>
                    <p><span id="statPower">0</span> кВт</p>
                </div>
                <div class="stat-card">
                    <h3>Загальна ємність АКБ</h3>
                    <p><span id="statBattery">0</span> кВт*год</p>
                </div>
            </div>
        </section>

        <main>
            <section class="form-section">
                <h2>Реєстрація нової СЕС</h2>
                <form id="sppForm">
                    <div class="form-group">
                        <label for="ownerName">ПІБ власника *</label>
                        <input type="text" id="ownerName" name="ownerName" required placeholder="Іванов Іван Іванович">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="objectType">Тип об'єкта *</label>
                            <select id="objectType" name="objectType" required>
                                <option value="">Оберіть тип</option>
                                <option value="roof">Дах приватного будинку</option>
                                <option value="ground">Наземна конструкція</option>
                                <option value="garage">Гараж / Прибудова</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="panelType">Тип панелей *</label>
                            <select id="panelType" name="panelType" required>
                                <option value="">Оберіть тип</option>
                                <option value="mono">Монокристалічні</option>
                                <option value="poly">Полікристалічні</option>
                                <option value="thin">Тонкоплівкові</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="address">Адреса встановлення *</label>
                        <textarea id="address" name="address" required placeholder="Місто, вулиця, будинок..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="power">Потужність інвертора (кВт) *</label>
                            <input type="number" id="power" name="power" required min="1" step="0.1" placeholder="Наприклад: 10">
                        </div>
                        <div class="form-group">
                            <label for="panelCount">Кількість панелей *</label>
                            <input type="number" id="panelCount" name="panelCount" required min="1" placeholder="Наприклад: 24">
                        </div>
                    </div>

                    <div class="calculation-box">
                        Орієнтовна річна генерація: <strong id="calcResult">0</strong> кВт*год
                    </div>

                    <div class="form-group">
                        <label>Наявність акумуляторів *</label>
                        <div class="radio-group">
                            <label><input type="radio" name="hasBattery" value="no" checked> Ні</label>
                            <label><input type="radio" name="hasBattery" value="yes"> Так</label>
                        </div>
                    </div>

                    <div class="form-group" id="batteryCapacityGroup" style="display: none;">
                        <label for="batteryCapacity">Ємність акумуляторів (кВт*год) *</label>
                        <input type="number" id="batteryCapacity" name="batteryCapacity" min="0.1" step="0.1" placeholder="Наприклад: 5.1">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Зареєструвати СЕС</button>
                    </div>
                </form>
                <div id="message" class="message"></div>
            </section>

            <section class="data-section">
                <h2>Список зареєстрованих об'єктів</h2>
                <div id="sppList" class="spp-list"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
